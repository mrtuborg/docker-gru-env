<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" width="220" height="280">
  <!-- Body (yellow rounded rect) -->
  <rect x="40" y="60" width="140" height="190" rx="70" ry="65" fill="#F5C823" stroke="#333" stroke-width="4"/>

  <!-- Wild hair strands -->
  <line x1="90" y1="62" x2="78" y2="28" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="60" x2="94" y2="22" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="60" x2="112" y2="20" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="62" x2="130" y2="24" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="133" y1="66" x2="148" y2="32" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="82" y1="66" x2="64" y2="36" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="74" x2="162" y2="50" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="74" y1="74" x2="52" y2="52" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Goggle band (black strap) -->
  <rect x="36" y="88" width="148" height="36" rx="10" fill="#222"/>

  <!-- Goggle (single eye) -->
  <circle cx="110" cy="106" r="30" fill="#ddd" stroke="#444" stroke-width="3"/>
  <circle cx="110" cy="106" r="24" fill="white"/>
  <!-- Iris -->
  <circle cx="110" cy="106" r="15" fill="#7B4F2E"/>
  <!-- Pupil -->
  <circle cx="110" cy="106" r="8" fill="#111"/>
  <!-- Eye shine -->
  <circle cx="102" cy="98" r="5" fill="white" opacity="0.85"/>
  <circle cx="116" cy="114" r="2.5" fill="white" opacity="0.5"/>
  <!-- Goggle rim detail -->
  <circle cx="110" cy="106" r="30" fill="none" stroke="#bbb" stroke-width="1.5"/>

  <!-- Smile (smirk) -->
  <path d="M82 148 Q110 168 138 148" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Overalls bib -->
  <path d="M62 175 Q62 155 74 150 L146 150 Q158 155 158 175 L158 250 Q158 262 146 262 L74 262 Q62 262 62 250 Z" fill="#6FA8D8" stroke="#333" stroke-width="3"/>

  <!-- Overalls top curve (bib top edge) -->
  <ellipse cx="110" cy="150" rx="36" ry="10" fill="#6FA8D8" stroke="#333" stroke-width="3"/>

  <!-- Overalls pocket -->
  <rect x="86" y="190" width="48" height="38" rx="5" fill="#5A8FBF" stroke="#333" stroke-width="2.5"/>

  <!-- Suspender straps -->
  <rect x="75" y="155" width="18" height="36" rx="9" fill="#6FA8D8" stroke="#333" stroke-width="2.5"/>
  <rect x="127" y="155" width="18" height="36" rx="9" fill="#6FA8D8" stroke="#333" stroke-width="2.5"/>

  <!-- Suspender buttons -->
  <circle cx="84" cy="174" r="5.5" fill="#F5C823" stroke="#333" stroke-width="2"/>
  <circle cx="136" cy="174" r="5.5" fill="#F5C823" stroke="#333" stroke-width="2"/>

  <!-- Arms -->
  <!-- Left arm (raised, waving) -->
  <ellipse cx="36" cy="185" rx="18" ry="30" fill="#F5C823" stroke="#333" stroke-width="3.5" transform="rotate(-20 36 185)"/>
  <!-- Left hand (fist) -->
  <circle cx="22" cy="162" r="16" fill="#F5C823" stroke="#333" stroke-width="3.5"/>
  <!-- Knuckle lines -->
  <path d="M13 155 Q22 148 31 155" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Right arm -->
  <ellipse cx="184" cy="188" rx="18" ry="30" fill="#F5C823" stroke="#333" stroke-width="3.5" transform="rotate(20 184 188)"/>
  <!-- Right hand -->
  <circle cx="198" cy="166" r="16" fill="#F5C823" stroke="#333" stroke-width="3.5"/>
  <path d="M189 159 Q198 152 207 159" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Legs (round stumps) -->
  <ellipse cx="85" cy="260" rx="22" ry="16" fill="#F5C823" stroke="#333" stroke-width="3"/>
  <ellipse cx="135" cy="260" rx="22" ry="16" fill="#F5C823" stroke="#333" stroke-width="3"/>

  <!-- Shoes (black) -->
  <ellipse cx="83" cy="272" rx="26" ry="11" fill="#222" stroke="#111" stroke-width="2"/>
  <ellipse cx="137" cy="272" rx="26" ry="11" fill="#222" stroke="#111" stroke-width="2"/>
</svg>
