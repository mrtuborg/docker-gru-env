<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle (for GitHub's circular crop) -->
  <circle cx="100" cy="100" r="100" fill="#F9C923"/>

  <!-- Body shadow -->
  <ellipse cx="100" cy="160" rx="45" ry="12" fill="#D4A800" opacity="0.4"/>

  <!-- Body -->
  <rect x="55" y="85" width="90" height="105" rx="45" fill="#F9C923"/>

  <!-- Overalls -->
  <rect x="60" y="130" width="80" height="62" rx="5" fill="#3b6cc4"/>
  <!-- Overalls top edge curved -->
  <ellipse cx="100" cy="130" rx="40" ry="8" fill="#3b6cc4"/>

  <!-- Suspenders -->
  <rect x="67" y="112" width="16" height="32" rx="8" fill="#3b6cc4"/>
  <rect x="117" y="112" width="16" height="32" rx="8" fill="#3b6cc4"/>

  <!-- Overalls pocket -->
  <rect x="81" y="148" width="38" height="26" rx="4" fill="#2f58a8"/>
  <line x1="81" y1="162" x2="119" y2="162" stroke="#3b6cc4" stroke-width="1.5"/>

  <!-- Pocket button -->
  <circle cx="100" cy="156" r="3.5" fill="#F9C923" stroke="#2f58a8" stroke-width="1"/>

  <!-- Suspender buttons -->
  <circle cx="75" cy="128" r="4.5" fill="#FFD700" stroke="#d4a800" stroke-width="1.5"/>
  <circle cx="125" cy="128" r="4.5" fill="#FFD700" stroke="#d4a800" stroke-width="1.5"/>

  <!-- Goggle band -->
  <rect x="40" y="70" width="120" height="40" rx="12" fill="#555"/>

  <!-- Goggle left -->
  <circle cx="80" cy="90" r="20" fill="white" stroke="#444" stroke-width="3"/>
  <circle cx="80" cy="90" r="13" fill="#5ba4f5"/>
  <circle cx="80" cy="90" r="7" fill="#1a1a2e"/>
  <circle cx="74" cy="84" r="4" fill="white" opacity="0.8"/>

  <!-- Goggle right -->
  <circle cx="120" cy="90" r="20" fill="white" stroke="#444" stroke-width="3"/>
  <circle cx="120" cy="90" r="13" fill="#5ba4f5"/>
  <circle cx="120" cy="90" r="7" fill="#1a1a2e"/>
  <circle cx="114" cy="84" r="4" fill="white" opacity="0.8"/>

  <!-- Goggle bridge -->
  <rect x="97" y="85" width="6" height="10" rx="3" fill="#666"/>

  <!-- Mouth smile -->
  <path d="M76 118 Q100 135 124 118" stroke="#8B4513" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <path d="M84 122 Q100 134 116 122 L116 128 Q100 138 84 128 Z" fill="white" opacity="0.9"/>

  <!-- Hair strands -->
  <path d="M86 70 Q80 50 84 38" stroke="#555" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M100 68 Q100 46 100 34" stroke="#555" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M114 70 Q120 50 116 38" stroke="#555" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M93 69 Q86 48 89 36" stroke="#555" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M107 69 Q114 48 111 36" stroke="#555" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
