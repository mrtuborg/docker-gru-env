<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 290">
  <defs>
    <clipPath id="bc">
      <rect x="38" y="36" width="124" height="228" rx="62"/>
    </clipPath>
  </defs>

  <!-- Yellow body -->
  <rect x="38" y="36" width="124" height="228" rx="62" fill="#F5C823"/>

  <!-- Blue overalls — fills lower body, clipped to body shape -->
  <rect x="38" y="158" width="124" height="110" fill="#5B9BD5" clip-path="url(#bc)"/>
  <!-- Overalls top curved edge -->
  <ellipse cx="100" cy="158" rx="62" ry="13" fill="#5B9BD5"/>

  <!-- Overalls pocket -->
  <rect x="76" y="178" width="48" height="36" rx="6" fill="#4A87C5"/>
  <rect x="76" y="178" width="48" height="36" rx="6" fill="none" stroke="#2C2C2C" stroke-width="2"/>

  <!-- Suspender straps -->
  <rect x="66" y="134" width="16" height="34" rx="8" fill="#5B9BD5"/>
  <rect x="118" y="134" width="16" height="34" rx="8" fill="#5B9BD5"/>

  <!-- Suspender strap outlines -->
  <rect x="66" y="134" width="16" height="34" rx="8" fill="none" stroke="#2C2C2C" stroke-width="2"/>
  <rect x="118" y="134" width="16" height="34" rx="8" fill="none" stroke="#2C2C2C" stroke-width="2"/>

  <!-- Suspender buttons -->
  <circle cx="74" cy="157" r="5.5" fill="#F5C823" stroke="#2C2C2C" stroke-width="1.5"/>
  <circle cx="126" cy="157" r="5.5" fill="#F5C823" stroke="#2C2C2C" stroke-width="1.5"/>

  <!-- Goggle band — clipped to body -->
  <rect x="30" y="94" width="140" height="38" fill="#1C1C1C" clip-path="url(#bc)"/>

  <!-- Goggle outer ring (silver) -->
  <circle cx="100" cy="113" r="30" fill="#CECECE"/>
  <!-- Goggle inner ring -->
  <circle cx="100" cy="113" r="26" fill="white"/>
  <!-- Iris -->
  <circle cx="100" cy="113" r="15" fill="#7B4F2E"/>
  <!-- Pupil -->
  <circle cx="100" cy="113" r="8" fill="#111"/>
  <!-- Shine -->
  <circle cx="92" cy="106" r="5" fill="white" opacity="0.75"/>
  <circle cx="107" cy="120" r="2.5" fill="white" opacity="0.4"/>
  <!-- Goggle rim detail -->
  <circle cx="100" cy="113" r="30" fill="none" stroke="#2C2C2C" stroke-width="2.5"/>

  <!-- Smile -->
  <path d="M78 144 Q100 160 122 144" stroke="#2C2C2C" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Body outline on top -->
  <rect x="38" y="36" width="124" height="228" rx="62" fill="none" stroke="#2C2C2C" stroke-width="4"/>

  <!-- Overalls bottom outline -->
  <ellipse cx="100" cy="158" rx="62" ry="13" fill="none" stroke="#2C2C2C" stroke-width="2"/>

  <!-- Wild hair — short tufts around top of head -->
  <path d="M80 44 C76 30 70 22 74 14" stroke="#2C2C2C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M90 39 C88 24 86 14 90 6"  stroke="#2C2C2C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M100 37 C100 22 100 12 100 4" stroke="#2C2C2C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M110 39 C112 24 114 14 110 6" stroke="#2C2C2C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M120 44 C124 30 130 22 126 14" stroke="#2C2C2C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M128 52 C136 40 144 34 142 24" stroke="#2C2C2C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M72 52 C64 40 56 34 58 24"  stroke="#2C2C2C" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Left arm -->
  <ellipse cx="30" cy="178" rx="16" ry="22" fill="#F5C823" stroke="#2C2C2C" stroke-width="3.5" transform="rotate(-15 30 178)"/>
  <!-- Left hand (round black fist) -->
  <circle cx="18" cy="160" r="14" fill="#1C1C1C"/>

  <!-- Right arm -->
  <ellipse cx="170" cy="178" rx="16" ry="22" fill="#F5C823" stroke="#2C2C2C" stroke-width="3.5" transform="rotate(15 170 178)"/>
  <!-- Right hand -->
  <circle cx="182" cy="160" r="14" fill="#1C1C1C"/>

  <!-- Shoes -->
  <ellipse cx="82"  cy="272" rx="26" ry="11" fill="#1C1C1C"/>
  <ellipse cx="118" cy="272" rx="26" ry="11" fill="#1C1C1C"/>
</svg>
