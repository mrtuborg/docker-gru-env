gh_host: sensio.ghe.com
data_repo: roommate/roommate-sensei-o

project:
  owner: roommate
  number: 14
  name: "RoomMate QA — Stress Testing"

watcher:
  prompts_dir: stage-prompts   # relative to this file
  # stage_order defines the pipeline left→right. The runner uses pull-principle:
  # rightmost AI-actionable stage is always picked first. Stages without a handler
  # file (Backlog, Review, Done) are skipped regardless of permission here.
  stage_order: [Todo, HW-Check, HW-Update, HW-Stress, HW-Log]
  poll_interval: 300             # seconds to sleep when board has no actionable issues (0=run once)
  max_issues: 10                 # safety cap per run (pass via --max; not read from config)
  session_timeout_hours: 4       # wall-clock limit per issue session; exit 124 → needs-human
  models:                        # tried in priority order; 3 consecutive failures → switch to next
    - model: claude-sonnet-4.6   # priority 1 — best quality, used first
      priority: 1
    - model: claude-haiku-4.5    # priority 2 — cheaper fallback
      priority: 2

# Board where new findings / fix-tracking issues are filed (separate from the pipeline board above).
# IDs below were looked up from project #13 via GraphQL; refresh if the board is re-created.
findings_project:
  owner: roommate
  number: 13
  id: "PVT_kwDOAB4iXc4AATZN"
  name: "roomboard-linux platform support"
  status_field: "PVTSSF_lADOAB4iXc4AATZNzgAS7DA"
  initial_status:
    name: Analysis
    option_id: "f971fb55"

inventory: inventory/testwall-01-north.yaml # relative to this file

working_dir: ..                            # relative to this file → repo root
device_status_file: releases/device-status.json  # written by pipeline_advance; read by dashboard
